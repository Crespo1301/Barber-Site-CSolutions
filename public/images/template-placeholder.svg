  <rect x="170" y="210" width="860" height="480" rx="28" fill="none" stroke="#c49a43" stroke-opacity="0.4" stroke-width="4" />
  <text x="600" y="420" text-anchor="middle" fill="#f5f1e8" font-family="Georgia, serif" font-size="58">Barber Template</text>
  <text x="600" y="485" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-size="24" letter-spacing="6">DROP IN CLIENT PHOTOS AND BRANDING</text>
